[package]
name = "steam-ticket-generator"
authors = ["NotAndreh"]
version = "1.2.1"
edition = "2024"

# CLI binary (default)
[[bin]]
name = "steam-ticket-cli"
path = "src/main.rs"

# GUI binary
[[bin]]
name = "steam-ticket-gui"
path = "src/gui_main.rs"

[dependencies]
# Existing dependencies
base64 = "0.22.1"
dialoguer = "0.11.0"
steamworks-sys = { git = "https://github.com/Noxime/steamworks-rs" }

# GUI dependencies
eframe = "0.30"
egui = "0.30"

[profile.release]
lto = true
codegen-units = 1
opt-level = "z"
strip = true
panic = "abort"
